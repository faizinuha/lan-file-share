name: Release

# Single end-to-end release pipeline. On every push to `main` we:
#
#   1. Inspect commits since the last `v*` tag (Conventional Commits).
#      - `feat:`           -> minor bump
#      - `fix:` / `perf:`  -> patch bump
#      - `<type>!:` or `BREAKING CHANGE:` -> major bump
#      - anything else     -> no release
#   2. Bump `package.json`, prepend CHANGELOG, commit + tag `vX.Y.Z`, push.
#   3. Checkout that tag on Linux / macOS / Windows runners, build installers
#      via electron-builder, upload them as workflow artifacts.
#   4. Attach every artifact to the matching GitHub Release so
#      `electron-updater` clients pick the new version up.
#
# Manual escape hatch: `workflow_dispatch` lets maintainers force a specific
# bump (patch/minor/major) or rebuild a specific tag without touching git.
#
# Example progression:
#   v0.4.0 + `feat: foo`           -> v0.5.0
#   v0.5.0 + `fix: bar`            -> v0.5.1
#   v0.9.1 + `fix: baz`            -> v0.9.2
#   v0.9.2 + `feat!: drop Node 18` -> v1.0.0
#
# Release commits themselves are skipped via a `chore(release): ...` prefix
# (and `[skip release]` marker) so the workflow never loops on its own push.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_bump:
        description: "Force bump type (patch | minor | major). Leave empty for auto."
        required: false
        default: ""
      ref_tag:
        description: "Existing v* tag to rebuild (skips the bump step). Leave empty for normal run."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # 1. Compute next version, bump package.json, commit + tag, push.
  # -----------------------------------------------------------------------
  bump:
    name: Compute version + tag
    # Ignore the bot's own release commits so we never loop.
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.final.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # If the user rebuilt an existing tag via workflow_dispatch, skip the
      # bump entirely and just propagate the tag ref to downstream jobs.
      - name: Resolve tag ref (manual rebuild)
        id: resolve
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.ref_tag != ''
        env:
          REF_TAG: ${{ github.event.inputs.ref_tag }}
        run: |
          echo "Rebuilding existing tag $REF_TAG, skipping bump."
          version="${REF_TAG#v}"
          echo "new_version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute bump (auto / forced)
        id: bump
        if: steps.resolve.outputs.new_version == ''
        env:
          FORCE_BUMP: ${{ github.event.inputs.force_bump }}
        run: |
          if [ -n "${FORCE_BUMP:-}" ]; then
            case "$FORCE_BUMP" in
              major|minor|patch) ;;
              *) echo "Invalid force_bump: $FORCE_BUMP" >&2; exit 1 ;;
            esac
            # Match the auto-bump baseline: use the highest v* tag (by
            # git's version sorter, so v0.10.0 > v0.9.0) and only fall
            # back to package.json if no v* tags exist yet. Bumping off
            # package.json alone would regress when package.json lags
            # behind published tags (e.g. pkg=0.4.0 but v1.0.0 is tagged
            # -> force patch would compute v0.4.1 < v1.0.0).
            last_tag=$(git for-each-ref --sort=-version:refname --count=1 --format="%(refname:short)" "refs/tags/v*" || true)
            if [ -n "$last_tag" ]; then
              current="${last_tag#v}"
            else
              current=$(node -p "require('./package.json').version")
            fi
            next=$(CURRENT="$current" node -e "
              const v = process.env.CURRENT.split('.').map(Number);
              const kind = process.env.FORCE_BUMP;
              if (kind==='major'){v[0]+=1;v[1]=0;v[2]=0;}
              else if (kind==='minor'){v[1]+=1;v[2]=0;}
              else {v[2]+=1;}
              console.log(v.join('.'));
            ")
            {
              echo "bump=$FORCE_BUMP"
              echo "current_version=$current"
              echo "new_version=$next"
              echo "notes<<EOF"
              echo "Manually triggered $FORCE_BUMP release (baseline: ${last_tag:-package.json $current})."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            node scripts/conventional-bump.js
          fi

      - name: No-op if no bump
        if: steps.resolve.outputs.new_version == '' && steps.bump.outputs.new_version == ''
        run: echo "No releasable commits since last tag; skipping release."

      - name: Bump package.json
        if: steps.resolve.outputs.new_version == '' && steps.bump.outputs.new_version != ''
        run: |
          npm version "${{ steps.bump.outputs.new_version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Update CHANGELOG.md
        if: steps.resolve.outputs.new_version == '' && steps.bump.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          NOTES: ${{ steps.bump.outputs.notes }}
        run: |
          today=$(date -u +%Y-%m-%d)
          header="## v${NEW_VERSION} â€” ${today}"
          if [ ! -f CHANGELOG.md ]; then
            printf "# Changelog\n\nAll notable changes. Auto-generated from Conventional Commits.\n\n" > CHANGELOG.md
          fi
          tmp=$(mktemp)
          {
            awk 'NR==1{print;next} /^$/ && !inserted {print; print "'"$header"'"; print ""; print ENVIRON["NOTES"]; print ""; inserted=1; next} {print}' \
              inserted=0 CHANGELOG.md
          } > "$tmp"
          mv "$tmp" CHANGELOG.md

      - name: Abort if tag already exists
        if: steps.resolve.outputs.new_version == '' && steps.bump.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          # Belt-and-suspenders: conventional-bump.js now bumps off the
          # highest v* tag, not package.json, so collisions *shouldn't*
          # happen. If one does (e.g. a tag was pushed manually between
          # the bump-compute step and this one), fail loudly instead of
          # silently skipping so the operator can resolve it.
          if git ls-remote --exit-code --tags origin "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${NEW_VERSION} already exists on origin. Aborting release." >&2
            exit 1
          fi

      - name: Commit, tag, push
        if: steps.resolve.outputs.new_version == '' && steps.bump.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          NOTES: ${{ steps.bump.outputs.notes }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v${NEW_VERSION} [skip release]" -m "${NOTES}"
          git tag -a "v${NEW_VERSION}" -m "v${NEW_VERSION}" -m "${NOTES}"
          git push origin main --follow-tags

      # Consolidate the two paths (manual rebuild vs auto-bump) into a single
      # output that downstream jobs can gate on.
      - name: Finalize output
        id: final
        env:
          RESOLVE_VERSION: ${{ steps.resolve.outputs.new_version }}
          BUMP_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          if [ -n "${RESOLVE_VERSION:-}" ]; then
            echo "new_version=${RESOLVE_VERSION}" >> "$GITHUB_OUTPUT"
          elif [ -n "${BUMP_VERSION:-}" ]; then
            echo "new_version=${BUMP_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "new_version=" >> "$GITHUB_OUTPUT"
          fi

  # -----------------------------------------------------------------------
  # 2. Build installers on all three OSes from the freshly-tagged commit.
  # -----------------------------------------------------------------------
  build:
    name: Build installer (${{ matrix.os }})
    needs: bump
    if: needs.bump.outputs.new_version != ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the tagged commit so package.json has the new version.
          # Use the fully-qualified refs/tags/... form to avoid ambiguity
          # with branches of the same name, and drop fetch-tags since the
          # ref-specific fetch resolves the single tag we actually need.
          ref: refs/tags/v${{ needs.bump.outputs.new_version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Build installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        # --publish never here; the release job below attaches artifacts in
        # one shot so we don't race three parallel publishers against the
        # same GitHub Release.
        run: npx electron-builder --publish never
      - name: List build output
        shell: bash
        run: ls -lah dist/ || true
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-file-share-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 30

  # -----------------------------------------------------------------------
  # 3. Publish all artifacts to the GitHub Release for the new tag.
  # -----------------------------------------------------------------------
  release:
    name: Attach artifacts to GitHub Release
    needs: [bump, build]
    if: needs.bump.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.bump.outputs.new_version }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List downloaded artifacts
        run: ls -lahR artifacts/
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.new_version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/latest*.yml
